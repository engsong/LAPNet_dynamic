        font-src 'self' data: https://cdnjs.cloudflare.com https://fonts.gstatic.com;
        connect-src 'self'
          http://localhost:3000
          http://127.0.0.1:3000
          ws://localhost:3000
          ws://127.0.0.1:3000
          http://localhost:5173
          http://127.0.0.1:5173
